general.import = [ "~/.config/omarchy/current/theme/alacritty.toml" ]

[env]
TERM = "xterm-256color"

[terminal]
osc52 = "CopyPaste"

# Silence the macOS system bell on BEL (0x07) bytes from inner apps.
[bell]
command = { program = "/usr/bin/true" }

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
# Omarchy default is 9; local macOS default.
size = 16

[window]
padding.x = 14
padding.y = 14
decorations = "None"
# macOS: send Option as Alt/Meta so tmux M-1..M-9 works.
option_as_alt = "Both"

[keyboard]
bindings = [
{ key = "Insert", mods = "Shift", action = "Paste" },
{ key = "Insert", mods = "Control", action = "Copy" },
{ key = "Return", mods = "Shift", chars = "\u001B\r" },
# Send Ctrl+_ (0x1f) for Ctrl+/ so nvim can bind it distinctly.
# { key = "Slash", mods = "Control", chars = "\u001F" }
]
